<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#d4af37;
  --dark:#0f0f0f;
  --glass:rgba(255,255,255,0.05);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:"Cairo",sans-serif}

body{
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:#fff;
}

/* Glass Card */
.glass{
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-radius:15px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
}

/* Buttons */
button{
  background:var(--gold);
  color:#000;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{opacity:.8}

/* Layout */
header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  color:var(--gold);
  font-size:20px;
}

.container{padding:10px}

/* Product Cards */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.card{
  position:relative;
  overflow:hidden;
  animation:fadeIn .5s ease;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:var(--gold);
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  font-size:12px;
  opacity:.6;
}

/* Toast */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#222;
  padding:10px 15px;
  border-radius:10px;
  opacity:0;
  transition:.4s;
}
.toast.show{opacity:1}

/* Forms */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* Animations */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header id="storeName">متجري</header>

<div class="container" id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* ================= STORAGE ================= */
const DB = {
  get(){ return JSON.parse(localStorage.getItem("storeDB")||'{}') },
  set(data){ localStorage.setItem("storeDB",JSON.stringify(data)) }
}

function initDB(){
  if(!localStorage.getItem("storeDB")){
    DB.set({
      categories:[],
      products:[],
      orders:[],
      settings:{name:"متجري",whatsapp:""}
    })
  }
}
initDB()

/* ================= TOAST ================= */
function toast(msg){
  const t=document.getElementById("toast")
  t.innerText=msg
  t.classList.add("show")
  setTimeout(()=>t.classList.remove("show"),2000)
}

/* ================= ROUTER ================= */
let route="store"

function navigate(r){
  route=r
  render()
}

/* ================= LOGIN ================= */
function loginUI(){
  return `
  <div class="glass">
    <h3>لوحة التحكم</h3>
    <input id="user" placeholder="اسم المستخدم">
    <input id="pass" type="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
  </div>`
}

function login(){
  if(user.value==="admin" && pass.value==="war2024"){
    localStorage.setItem("auth","1")
    navigate("admin")
  } else toast("بيانات خاطئة")
}

/* ================= ADMIN ================= */
function adminUI(){
  const db=DB.get()
  return `
  <div class="glass">
    <h3>لوحة التحكم</h3>
    <button onclick="navigate('store')">عرض المتجر</button>
    
    <h4>إضافة قسم</h4>
    <input id="catName">
    <button onclick="addCat()">إضافة</button>

    <h4>الأقسام</h4>
    ${db.categories.map((c,i)=>`
      <div>${c} <button onclick="delCat(${i})">❌</button></div>
    `).join("")}

    <hr>

    <h4>إضافة منتج</h4>
    <input id="pName" placeholder="اسم">
    <input id="pPrice" placeholder="السعر">
    <input id="pLink" placeholder="رابط خارجي">
    <input type="file" onchange="uploadImg(event)">
    <button onclick="addProduct()">إضافة</button>

    <hr>

    <h4>الطلبات</h4>
    ${db.orders.map(o=>`
      <div class="glass">${o.name} - ${o.phone}</div>
    `).join("")}

    <hr>
    <button onclick="exportData()">تصدير</button>
    <input type="file" onchange="importData(event)">
  </div>
  `
}

function addCat(){
  let db=DB.get()
  db.categories.push(catName.value)
  DB.set(db)
  render()
}

function delCat(i){
  let db=DB.get()
  db.categories.splice(i,1)
  DB.set(db)
  render()
}

/* ================= IMAGE ================= */
let imgData=""
function uploadImg(e){
  const file=e.target.files[0]
  const reader=new FileReader()
  reader.onload=()=>{
    imgData=reader.result
  }
  reader.readAsDataURL(file)
}

/* ================= PRODUCT ================= */
function addProduct(){
  let db=DB.get()
  db.products.push({
    name:pName.value,
    price:pPrice.value,
    link:pLink.value,
    img:imgData
  })
  DB.set(db)
  render()
}

/* ================= STORE ================= */
function storeUI(){
  const db=DB.get()
  document.getElementById("storeName").innerText=db.settings.name

  return `
  <div class="products">
  ${db.products.map((p,i)=>`
    <div class="card glass">
      <img src="${p.img||''}">
      <h4>${p.name}</h4>
      <div class="price">${p.price} ج</div>
      <button onclick="order(${i})">اطلب الآن</button>
    </div>
  `).join("")}
  </div>
  <button onclick="navigate('login')">لوحة التحكم</button>
  `
}

/* ================= ORDER ================= */
function order(i){
  const db=DB.get()
  const name=prompt("اسمك")
  const phone=prompt("رقمك")

  db.orders.push({name,phone,product:db.products[i].name})
  DB.set(db)

  window.open(db.products[i].link,"_blank")
  toast("تم الطلب")
}

/* ================= EXPORT ================= */
function exportData(){
  const data=JSON.stringify(DB.get())
  const blob=new Blob([data])
  const a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="backup.json"
  a.click()
}

function importData(e){
  const file=e.target.files[0]
  const reader=new FileReader()
  reader.onload=()=>{
    localStorage.setItem("storeDB",reader.result)
    render()
  }
  reader.readAsText(file)
}

/* ================= RENDER ================= */
function render(){
  const app=document.getElementById("app")

  if(route==="login") app.innerHTML=loginUI()
  else if(route==="admin"){
    if(localStorage.getItem("auth")) app.innerHTML=adminUI()
    else navigate("login")
  }
  else app.innerHTML=storeUI()
}

render()
</script>

</body>
</html>
